name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libayatana-appindicator3-dev librsvg2-dev pkg-config
      - name: Install npm dependencies
        run: pnpm install
      - name: Rust fmt
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml
      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Cargo deny
        run: cd src-tauri && cargo deny check
      - name: TypeScript
        run: pnpm tsc --noEmit
      - name: ESLint
        run: pnpm eslint .
      - name: Prettier
        run: pnpm prettier --check "src/**/*.{ts,tsx}"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libayatana-appindicator3-dev librsvg2-dev pkg-config
      - name: Install npm dependencies
        run: pnpm install
      - name: Rust tests
        run: cd src-tauri && cargo nextest run --workspace
      - name: Frontend tests
        run: pnpm vitest run

  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            deps: |
              sudo apt-get update
              sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libayatana-appindicator3-dev librsvg2-dev pkg-config
          - os: windows-latest
            deps: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install system dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}
      - name: Install npm dependencies
        run: pnpm install
      - name: Build
        run: pnpm tauri build
