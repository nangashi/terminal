pre-commit:
  parallel: true
  commands:
    rust-fmt:
      run: cargo fmt --check --manifest-path src-tauri/Cargo.toml
    rust-clippy:
      run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
    biome:
      run: TMPDIR=/tmp pnpm biome check src/
    oxlint:
      run: TMPDIR=/tmp pnpm oxlint src/
    tsc:
      run: TMPDIR=/tmp pnpm tsc --noEmit
    gitleaks:
      run: gitleaks protect --staged

pre-push:
  parallel: true
  commands:
    check-bindings:
      run: just generate-bindings && git diff --exit-code src/bindings.ts
    test-rust:
      run: cd src-tauri && cargo nextest run --workspace
    test-frontend:
      run: TMPDIR=/tmp pnpm vitest run
