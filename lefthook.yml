pre-commit:
  parallel: true
  commands:
    rust-fmt:
      run: cargo fmt --check --manifest-path src-tauri/Cargo.toml
    rust-clippy:
      run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
    eslint:
      run: pnpm eslint .
    prettier:
      run: pnpm prettier --check "src/**/*.{ts,tsx}"
    tsc:
      run: pnpm tsc --noEmit

pre-push:
  commands:
    test-rust:
      run: cd src-tauri && cargo nextest run --workspace
    test-frontend:
      run: pnpm vitest run
